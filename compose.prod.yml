x-environment: &environment
  APP_URL: ${APP_URL}
  MCP_BASE_URL: ${MCP_BASE_URL}
  WS_URL: ${WS_URL:-}
  API_BASE_URL: http://app:3000
  STREAMIENT_APP: web
  MONGO_URI: mongodb://mongo:27017/streamient
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  REDIS_SENTINEL: ${REDIS_SENTINEL:-}
  API_RATE_LIMIT_ENABLED: "${API_RATE_LIMIT_ENABLED:-true}"
  API_RATE_LIMIT_WINDOW_MS: "${API_RATE_LIMIT_WINDOW_MS:-60000}"
  API_RATE_LIMIT_GENERAL_PER_MINUTE: "${API_RATE_LIMIT_GENERAL_PER_MINUTE:-120}"
  API_RATE_LIMIT_RAZUNA_FILES_PER_MINUTE: "${API_RATE_LIMIT_RAZUNA_FILES_PER_MINUTE:-300}"
  API_RATE_LIMIT_EXPENSIVE_PER_MINUTE: "${API_RATE_LIMIT_EXPENSIVE_PER_MINUTE:-60}"
  API_RATE_LIMIT_UPLOAD_PER_MINUTE: "${API_RATE_LIMIT_UPLOAD_PER_MINUTE:-20}"
  MCP_RATE_LIMIT_ENABLED: "${MCP_RATE_LIMIT_ENABLED:-true}"
  MCP_RATE_LIMIT_WINDOW_MS: "${MCP_RATE_LIMIT_WINDOW_MS:-60000}"
  MCP_IP_FLOOD_PER_MINUTE: "${MCP_IP_FLOOD_PER_MINUTE:-300}"
  MCP_UNAUTH_PER_MINUTE: "${MCP_UNAUTH_PER_MINUTE:-30}"
  MCP_AUTH_PER_MINUTE: "${MCP_AUTH_PER_MINUTE:-120}"
  MCP_HEAVY_TOOL_PER_MINUTE: "${MCP_HEAVY_TOOL_PER_MINUTE:-30}"
  MCP_SSE_OPEN_PER_MINUTE: "${MCP_SSE_OPEN_PER_MINUTE:-20}"
  MCP_TOOL_CONCURRENCY: "${MCP_TOOL_CONCURRENCY:-3}"
  MCP_HEAVY_TOOL_CONCURRENCY: "${MCP_HEAVY_TOOL_CONCURRENCY:-1}"
  TYPESENSE_HOST: typesense
  TYPESENSE_PORT: 8108
  TYPESENSE_PROTOCOL: http
  TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-verylongandsecurekey}
  TYPESENSE_NODES: ${TYPESENSE_NODES:-}
  CRAWL_STEP_LIMIT: ${CRAWL_STEP_LIMIT:-100}
  CRAWL_INDEX_BATCH_SIZE: ${CRAWL_INDEX_BATCH_SIZE:-25}
  SCHEDULER_CRAWL_ENABLED: ${SCHEDULER_CRAWL_ENABLED:-true}
  SESSION_SECRET: ${SESSION_SECRET}
  JWT_SECRET: ${JWT_SECRET}
  SMTP_HOST: ${SMTP_HOST}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER}
  SMTP_PASS: ${SMTP_PASS}
  SMTP_FROM: ${SMTP_FROM}
  WHITE_LABEL_ASSETS_DIR: ${WHITE_LABEL_ASSETS_DIR:-assets/white-label}
  WHITE_LABEL_CNAME_TARGET: ${WHITE_LABEL_CNAME_TARGET:-app.streamient.com}
  WHITE_LABEL_ENFORCE_CUSTOM_DOMAINS: ${WHITE_LABEL_ENFORCE_CUSTOM_DOMAINS:-true}
  CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
  CLOUDFLARE_ZONE_ID: ${CLOUDFLARE_ZONE_ID:-}
  # LLM
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
  # Global models: BYOK tenants and self-hosted installs. Managed (platform-key)
  # hosted tenants use the per-plan matrix below instead.
  CHAT_AI_MODEL: "gpt-5.4-mini"
  CHAT_AI_MODEL_PROVIDER: openai
  NL_SEARCH_MODEL: "gpt-5.4-mini"
  NL_SEARCH_MODEL_PROVIDER: openai
  TS_CONVERSATION_MODEL: "gpt-5.4-mini"
  TS_CONVERSATION_MODEL_PROVIDER: openai
  # Managed per-plan AI (optional — config.js defaults: Free = google/gemini-2.5-flash-lite;
  # Pro = openai/gpt-5.6-terra for chat + conversation and openai/gpt-5.4-mini for intent classification).
  FREE_AI_MODEL_PROVIDER: ${FREE_AI_MODEL_PROVIDER:-}
  FREE_CHAT_AI_MODEL: ${FREE_CHAT_AI_MODEL:-}
  FREE_NL_SEARCH_MODEL: ${FREE_NL_SEARCH_MODEL:-}
  FREE_TS_CONVERSATION_MODEL: ${FREE_TS_CONVERSATION_MODEL:-}
  PRO_AI_MODEL_PROVIDER: ${PRO_AI_MODEL_PROVIDER:-}
  PRO_CHAT_AI_MODEL: ${PRO_CHAT_AI_MODEL:-}
  PRO_NL_SEARCH_MODEL: ${PRO_NL_SEARCH_MODEL:-}
  PRO_TS_CONVERSATION_MODEL: ${PRO_TS_CONVERSATION_MODEL:-}
  FREE_AI_DAILY_LIMIT: ${FREE_AI_DAILY_LIMIT:-}
  ENABLE_OPENPANEL: ${ENABLE_OPENPANEL:-false}
  OPENPANEL_CLIENT_ID: ${OPENPANEL_CLIENT_ID:-}
  OPENPANEL_CLIENT_SECRET: ${OPENPANEL_CLIENT_SECRET:-}
  OPENPANEL_API_URL: ${OPENPANEL_API_URL:-}
  HYPERDX_API_KEY: ${HYPERDX_API_KEY:-}
  HYPERDX_API_URL: ${HYPERDX_API_URL:-}
  HYPERDX_BROWSER_URL: ${HYPERDX_BROWSER_URL:-}
  ENABLE_OTEL: ${ENABLE_OTEL:-false}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
  OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-}
  OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-}
  OTEL_TRACES_EXPORTER: ${OTEL_TRACES_EXPORTER:-}
  OTEL_METRICS_EXPORTER: ${OTEL_METRICS_EXPORTER:-}
  OTEL_LOGS_EXPORTER: ${OTEL_LOGS_EXPORTER:-}
  OTEL_EXPORTER_OTLP_TIMEOUT: ${OTEL_EXPORTER_OTLP_TIMEOUT:-}
  OTEL_BSP_EXPORT_TIMEOUT: ${OTEL_BSP_EXPORT_TIMEOUT:-}
  OTEL_BSP_SCHEDULE_DELAY: ${OTEL_BSP_SCHEDULE_DELAY:-}
  OTEL_BSP_MAX_QUEUE_SIZE: ${OTEL_BSP_MAX_QUEUE_SIZE:-}
  OTEL_BSP_MAX_EXPORT_BATCH_SIZE: ${OTEL_BSP_MAX_EXPORT_BATCH_SIZE:-}
  OTEL_TRACES_SAMPLER: ${OTEL_TRACES_SAMPLER:-}
  OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACES_SAMPLER_ARG:-}
  NODE_ENV: production
  PORT: 3000
  GIT_ENCRYPTION_KEY: ${GIT_ENCRYPTION_KEY:-}
  SCREENSHOT_URL: "http://screenshot:3000"
  SCREENSHOT_SECRET: ${SCREENSHOT_SECRET}

services:
  app:
    image: ghcr.io/streamient/streamient:latest
    command: ["npm", "run", "start"]
    ports:
      - "3000:3000"
    environment: *environment
    volumes:
      - assets_data:/opt/streamient/assets
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - mongo
      - redis
      - typesense
    restart: unless-stopped

  ws:
    image: ghcr.io/streamient/streamient:latest
    command: ["npm", "run", "start"]
    ports:
      - "3001:3001"
    environment:
      <<: *environment
      STREAMIENT_APP: ws
      PORT: 3001
      SERVER_MODE: ws
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - redis
      - mongo
      - typesense
    restart: unless-stopped

  mcp:
    image: ghcr.io/streamient/streamient:latest
    working_dir: /opt/streamient/apps/mcp
    command: ["npm", "run", "start"]
    ports:
      - "3002:3002"
    environment:
      <<: *environment
      STREAMIENT_APP: mcp
      PORT: 3002
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  scheduler:
    image: ghcr.io/streamient/streamient:latest
    command: ["npm", "run", "start"]
    environment:
      <<: *environment
      STREAMIENT_APP: scheduler
      SERVER_MODE: scheduler
    volumes:
      - assets_data:/opt/streamient/assets
    depends_on:
      - mongo
      - redis
      - typesense
    restart: unless-stopped

  mongo:
    image: percona/percona-server-mongodb:6.0
    command: mongod --setParameter perconaTelemetry=false --replSet rs0 --bind_ip_all
    volumes:
      - mongo_data:/data/db
    environment:
      PERCONA_TELEMETRY_DISABLE: 1
  
  mongo-init:
    image: percona/percona-server-mongodb:6.0
    depends_on:
      mongo:
        condition: service_started
    volumes:
      - ./docker/mongo-init-replset.sh:/docker-entrypoint-initdb.d/init.sh:ro
    entrypoint: /bin/bash
    command: /docker-entrypoint-initdb.d/init.sh
    environment:
      PERCONA_TELEMETRY_DISABLE: 1
      MONGO_HOST: mongo

  redis:
    image: redis:8-bookworm
    command: redis-server --appendonly yes --port 6379 --save ""
    volumes:
      - redis_data:/data
    restart: unless-stopped

  typesense:
    image: typesense/typesense:30.2
    command: --data-dir /data --api-key=${TYPESENSE_API_KEY}
    volumes:
      - typesense_data:/data
    restart: unless-stopped

  screenshot:
    image: ghcr.io/streamient/screenshot:latest
    restart: unless-stopped
    init: true
    ports:
      - 3000
    environment:
      PORT: 3000
    shm_size: '2g'
    hostname: screenshot

volumes:
  mongo_data:
  typesense_data:
  redis_data:
  assets_data:
