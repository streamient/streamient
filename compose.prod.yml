x-environment: &environment
  APP_URL: ${APP_URL}
  MCP_BASE_URL: ${MCP_BASE_URL}
  WS_URL: ${WS_URL:-}
  API_BASE_URL: http://app:3000
  KUMBUKUM_APP: web
  MONGO_URI: mongodb://mongo:27017/kumbukum
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  REDIS_SENTINEL: ${REDIS_SENTINEL:-}
  TYPESENSE_HOST: typesense
  TYPESENSE_PORT: 8108
  TYPESENSE_PROTOCOL: http
  TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-verylongandsecurekey}
  TYPESENSE_NODES: ${TYPESENSE_NODES:-}
  SESSION_SECRET: ${SESSION_SECRET}
  JWT_SECRET: ${JWT_SECRET}
  SMTP_HOST: ${SMTP_HOST}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER}
  SMTP_PASS: ${SMTP_PASS}
  SMTP_FROM: ${SMTP_FROM}
  CHAT_AI_MODEL: ${CHAT_AI_MODEL:-gemini-2.0-flash}
  CHAT_AI_MODEL_PROVIDER: ${CHAT_AI_MODEL_PROVIDER:-google}
  NL_SEARCH_MODEL: ${NL_SEARCH_MODEL:-gemini-2.0-flash-lite}
  NL_SEARCH_MODEL_PROVIDER: ${NL_SEARCH_MODEL_PROVIDER:-google}
  TS_CONVERSATION_MODEL: ${TS_CONVERSATION_MODEL:-gemini-2.0-flash-lite}
  TS_CONVERSATION_MODEL_PROVIDER: ${TS_CONVERSATION_MODEL_PROVIDER:-google}
  GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  ENABLE_OPENPANEL: ${ENABLE_OPENPANEL:-false}
  OPENPANEL_CLIENT_ID: ${OPENPANEL_CLIENT_ID:-}
  OPENPANEL_CLIENT_SECRET: ${OPENPANEL_CLIENT_SECRET:-}
  OPENPANEL_API_URL: ${OPENPANEL_API_URL:-}
  SENTRY_DSN: ${SENTRY_DSN:-}
  ENABLE_SENTRY: ${ENABLE_SENTRY:-}
  SENTRY_ENABLED: ${SENTRY_ENABLED:-}
  SENTRY_TUNNEL_PROJECT_IDS: ${SENTRY_TUNNEL_PROJECT_IDS:-}
  ENABLE_OTEL: ${ENABLE_OTEL:-false}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
  OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-}
  OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-}
  OTEL_TRACES_EXPORTER: ${OTEL_TRACES_EXPORTER:-}
  OTEL_METRICS_EXPORTER: ${OTEL_METRICS_EXPORTER:-}
  OTEL_LOGS_EXPORTER: ${OTEL_LOGS_EXPORTER:-}
  OTEL_EXPORTER_OTLP_TIMEOUT: ${OTEL_EXPORTER_OTLP_TIMEOUT:-}
  OTEL_BSP_EXPORT_TIMEOUT: ${OTEL_BSP_EXPORT_TIMEOUT:-}
  OTEL_BSP_SCHEDULE_DELAY: ${OTEL_BSP_SCHEDULE_DELAY:-}
  OTEL_BSP_MAX_QUEUE_SIZE: ${OTEL_BSP_MAX_QUEUE_SIZE:-}
  OTEL_BSP_MAX_EXPORT_BATCH_SIZE: ${OTEL_BSP_MAX_EXPORT_BATCH_SIZE:-}
  OTEL_TRACES_SAMPLER: ${OTEL_TRACES_SAMPLER:-}
  OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACES_SAMPLER_ARG:-}
  NODE_ENV: production
  PORT: 3000
  GIT_ENCRYPTION_KEY: ${GIT_ENCRYPTION_KEY:-}
  SCREENSHOT_URL: "http://screenshot:3000"
  SCREENSHOT_SECRET: ${SCREENSHOT_SECRET}

services:
  app:
    image: ghcr.io/kumbukum/kumbukum:latest
    command: ["npm", "run", "start"]
    ports:
      - "3000:3000"
    environment: *environment
    volumes:
      - assets_data:/opt/kumbukum/assets
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - mongo
      - redis
      - typesense
    restart: unless-stopped

  ws:
    image: ghcr.io/kumbukum/kumbukum:latest
    command: ["npm", "run", "start"]
    ports:
      - "3001:3001"
    environment:
      <<: *environment
      KUMBUKUM_APP: ws
      PORT: 3001
      SERVER_MODE: ws
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - redis
      - mongo
      - typesense
    restart: unless-stopped

  mcp:
    image: ghcr.io/kumbukum/kumbukum:latest
    working_dir: /opt/kumbukum/apps/mcp
    command: ["npm", "run", "start"]
    ports:
      - "3002:3002"
    environment:
      <<: *environment
      KUMBUKUM_APP: mcp
      PORT: 3002
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  scheduler:
    image: ghcr.io/kumbukum/kumbukum:latest
    command: ["npm", "run", "start"]
    environment:
      <<: *environment
      KUMBUKUM_APP: scheduler
      SERVER_MODE: scheduler
    volumes:
      - assets_data:/opt/kumbukum/assets
    depends_on:
      - mongo
      - redis
      - typesense
    restart: unless-stopped

  mongo:
    image: percona/percona-server-mongodb:6.0
    command: mongod --setParameter perconaTelemetry=false --replSet rs0 --bind_ip_all
    volumes:
      - mongo_data:/data/db
    environment:
      PERCONA_TELEMETRY_DISABLE: 1
  
  mongo-init:
    image: percona/percona-server-mongodb:6.0
    depends_on:
      mongo:
        condition: service_started
    volumes:
      - ./docker/mongo-init-replset.sh:/docker-entrypoint-initdb.d/init.sh:ro
    entrypoint: /bin/bash
    command: /docker-entrypoint-initdb.d/init.sh
    environment:
      PERCONA_TELEMETRY_DISABLE: 1
      MONGO_HOST: mongo

  redis:
    image: redis:8-bookworm
    command: redis-server --appendonly yes --port 6379 --save ""
    volumes:
      - redis_data:/data
    restart: unless-stopped

  typesense:
    image: typesense/typesense:30.2
    command: --data-dir /data --api-key=${TYPESENSE_API_KEY}
    volumes:
      - typesense_data:/data
    restart: unless-stopped

  screenshot:
    image: ghcr.io/kumbukum/screenshot:latest
    restart: unless-stopped
    init: true
    ports:
      - 3000
    environment:
      PORT: 3000
    shm_size: '2g'
    hostname: screenshot

volumes:
  mongo_data:
  typesense_data:
  redis_data:
  assets_data:
