  OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
  OTEL_EXPORTER_OTLP_INSECURE: "${OTEL_EXPORTER_OTLP_INSECURE:-}"
  OTEL_EXPORTER_OTLP_PROTOCOL: "${OTEL_EXPORTER_OTLP_PROTOCOL:-}"
  OTEL_TRACES_EXPORTER: "${OTEL_TRACES_EXPORTER:-}"
  OTEL_METRICS_EXPORTER: "${OTEL_METRICS_EXPORTER:-}"
  OTEL_LOGS_EXPORTER: "${OTEL_LOGS_EXPORTER:-}"
  OTEL_EXPORTER_OTLP_TIMEOUT: "${OTEL_EXPORTER_OTLP_TIMEOUT:-}"
  OTEL_BSP_EXPORT_TIMEOUT: "${OTEL_BSP_EXPORT_TIMEOUT:-}"
  OTEL_BSP_SCHEDULE_DELAY: "${OTEL_BSP_SCHEDULE_DELAY:-}"
  OTEL_BSP_MAX_QUEUE_SIZE: "${OTEL_BSP_MAX_QUEUE_SIZE:-}"
  OTEL_BSP_MAX_EXPORT_BATCH_SIZE: "${OTEL_BSP_MAX_EXPORT_BATCH_SIZE:-}"
  OTEL_TRACES_SAMPLER: "${OTEL_TRACES_SAMPLER:-}"
  OTEL_TRACES_SAMPLER_ARG: "${OTEL_TRACES_SAMPLER_ARG:-}"
  STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
  STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
  STRIPE_PRO_PRICE_ID: "${STRIPE_PRO_PRICE_ID:-}"
  STRIPE_FREE_PRICE_ID: "${STRIPE_FREE_PRICE_ID:-}"
  STRIPE_PORTAL_CONFIG_ID: "${STRIPE_PORTAL_CONFIG_ID:-}"
  GIT_ENCRYPTION_KEY: "${GIT_ENCRYPTION_KEY:-}"

services:
  # ---------------------------------------------------------------
  # One-shot service: installs / syncs node_modules before any app
  # container starts. Every service that needs node_modules must
  # depend on this with condition: service_completed_successfully.
  # ---------------------------------------------------------------
  init:
    extends:
      file: ./compose.base.yml
      service: base
    build:
      context: .
      dockerfile: ./docker/dockerfiles/dev.Dockerfile
    environment:
      <<: *env
    restart: "no"
    command: ["/bin/bash", "-c", "
      if [ ! -d node_modules ] || [ package.json -nt node_modules/.installed ] || [ pnpm-lock.yaml -nt node_modules/.installed ]; then
        echo '[init] Installing / syncing dependencies...';
        pnpm install;
        touch node_modules/.installed;
        echo '[init] Done';
      else
        echo '[init] Dependencies up to date';
      fi
    "]
    networks:
      - hmnet16

  app:
    extends:
      file: ./compose.base.yml
      service: base
    command: ["npm", "run", "dev"]
    ports:
      - 3000
    environment:
      <<: *env
    dns:
      - 100.100.100.100
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      init:
        condition: service_completed_successfully
    # mongo-init:
    #     condition: service_completed_successfully
    # redis:
    #     condition: service_started
    # typesense:
    #     condition: service_started
    networks:
      - hmnet16

  mcp:
    extends:
      file: ./compose.base.yml
      service: base
    working_dir: /opt/streamient/apps/mcp
    command: ["npm", "run", "start"]
    ports:
      - 3000
    environment:
      <<: *env
      STREAMIENT_APP: mcp
      PORT: 3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      init:
        condition: service_completed_successfully
    networks:
      - hmnet16

  scheduler:
    extends:
      file: ./compose.base.yml
      service: base
    command: ["npm", "run", "start"]
    environment:
      <<: *env
      STREAMIENT_APP: scheduler
      SERVER_MODE: scheduler
    restart: unless-stopped
    depends_on:
      init:
        condition: service_completed_successfully
    networks:
      - hmnet16

  email-worker:
    extends:
      file: ./compose.base.yml
      service: base
    command: ["npm", "run", "start"]
    environment:
      <<: *env
      STREAMIENT_APP: email-worker
      SERVER_MODE: email-worker
    restart: unless-stopped
    depends_on:
      init:
        condition: service_completed_successfully
    networks:
      - hmnet16

volumes:
  node_modules:
  pnpm_store:
  mongo_data:
  typesense_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  hmnet16:
    external: true
