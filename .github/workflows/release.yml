name: Create GitHub Release

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types:
      - completed

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  create-release:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && startsWith(github.event.workflow_run.head_branch, '202') }}
    runs-on: ubuntu-latest

    steps:
      - name: Extract tag
        id: tag
        run: |
          echo "tag=${GITHUB_EVENT_WORKFLOW_RUN_HEAD_BRANCH}" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_EVENT_WORKFLOW_RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}

      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.tag }}
          fetch-depth: 0

      - name: Ensure tag exists
        run: git rev-parse "refs/tags/${{ steps.tag.outputs.tag }}"

      - name: Create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
          IMAGE: ghcr.io/streamient/streamient:${{ steps.tag.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists. Skipping."
            exit 0
          fi

          node scripts/generate-release-notes.mjs > release-notes.md

          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release-notes.md
